apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD__FORCE
          value: "true"
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secret
              key: admin-password
        volumeMounts:
        - name: provisioning-datasources
          mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
          subPath: datasource.yaml
        - name: provisioning-dashboards
          mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yaml
          subPath: dashboard-provider.yaml
        - name: provisioning-dashboard-json
          mountPath: /var/lib/grafana/dashboards/llm-api.json
          subPath: llm-api.json
      volumes:
      - name: provisioning-datasources
        configMap:
          name: grafana-provisioning
          items:
          - key: datasource.yaml
            path: datasource.yaml
      - name: provisioning-dashboards
        configMap:
          name: grafana-provisioning
          items:
          - key: dashboard-provider.yaml
            path: dashboard-provider.yaml
      - name: provisioning-dashboard-json
        configMap:
          name: grafana-provisioning
          items:
          - key: llm-api.json
            path: llm-api.json
