apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-app
spec:
  replicas: 1   # dev: single replica is enough
  selector:
    matchLabels:
      app: llm-app
  template:
    spec:
      initContainers:
      - name: wait-for-redis
        command:
          - sh
          - -c
          - |
            delay=2
            until nc -z dev-redis-service 6379; do
              echo "Redis not ready — retrying in ${delay}s..."
              sleep $delay
              delay=$((delay < 30 ? delay * 2 : 30))
            done
      - name: wait-for-vllm
        command:
          - sh
          - -c
          - |
            delay=5
            until wget -qO- http://dev-vllm-service:8000/health 2>/dev/null; do
              echo "vLLM not ready — retrying in ${delay}s..."
              sleep $delay
              delay=$((delay < 60 ? delay * 2 : 60))
            done
      containers:
      - name: app
        env:
        - name: VLLM_URL
          value: "http://dev-vllm-service:8000/v1"
        - name: REDIS_URL
          value: "redis://dev-redis-service:6379"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
