apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

namePrefix: dev-

resources:
  - ../../base
  - namespace.yaml

patches:
  - path: patch-llm-app.yaml
    target:
      kind: Deployment
      name: llm-app
  - path: patch-vllm-server.yaml
    target:
      kind: Deployment
      name: vllm-server
  - path: patch-redis-cache.yaml
    target:
      kind: Deployment
      name: redis-cache
  - path: patch-prometheus.yaml
    target:
      kind: Deployment
      name: prometheus
  - path: patch-grafana.yaml
    target:
      kind: Deployment
      name: grafana
  - path: patch-prometheus-config.yaml
    target:
      kind: ConfigMap
      name: prometheus-config
  - path: patch-grafana-provisioning.yaml
    target:
      kind: ConfigMap
      name: grafana-provisioning

labels:
  - pairs:
      env: dev
    includeSelectors: false
    includeTemplates: false
