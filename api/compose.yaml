services:
  redis:
    image: redis/redis-stack:latest
    deploy:
      resources:
        limits:
          memory: 512M
    container_name: redis-service
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_UI_PORT:-8001}:8001"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-service
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - TRANSFORMERS_VERBOSITY=info
      - HF_HUB_VERBOSITY=debug
    ports:
      - "${VLLM_HOST_PORT:-8002}:8000"
    env_file:
      - .env
    gpus: all
    volumes:
      - hf-cache:/root/.cache/huggingface
    command: >
      --model maikerdr/EnerGuia-0.5B
      --host 0.0.0.0
      --port 8000
      --dtype float16
      --gpu-memory-utilization 0.65
      --max-model-len 512

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  app:
    build:
      context: .
      shm_size: '2gb'
      args:
        TORCH_VARIANT: cpu
    deploy:
      resources:
        limits:
          memory: 1G
    container_name: fastapi-app
    environment:
      - HF_HOME=/app/.cache
    depends_on:
      redis:
        condition: service_healthy
      vllm:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    command: >
      python main.py

volumes:
  hf-cache:
